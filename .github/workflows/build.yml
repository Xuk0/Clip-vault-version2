      - name: Write layout files
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:background="@color/bg_primary">
              <com.google.android.material.appbar.AppBarLayout android:id="@+id/appBarLayout" android:layout_width="match_parent" android:layout_height="wrap_content" android:background="@color/bg_surface" app:elevation="0dp">
                  <com.google.android.material.appbar.MaterialToolbar android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="?attr/actionBarSize" android:paddingHorizontal="4dp">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center_vertical">
                          <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="ClipVault" android:textColor="@color/text_primary" android:textSize="20sp" android:textStyle="bold" android:fontFamily="monospace"/>
                          <TextView android:id="@+id/tvCount" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0 items" android:textColor="@color/text_muted" android:textSize="12sp" android:background="@drawable/badge_bg" android:paddingHorizontal="12dp" android:paddingVertical="4dp" android:layout_marginEnd="8dp"/>
                      </LinearLayout>
                  </com.google.android.material.appbar.MaterialToolbar>
                  <androidx.appcompat.widget.SearchView android:id="@+id/searchView" android:layout_width="match_parent" android:layout_height="48dp" android:layout_marginHorizontal="12dp" android:layout_marginBottom="8dp" app:queryHint="Search clipboard history…" app:iconifiedByDefault="false" style="@style/SearchViewStyle"/>
                  <HorizontalScrollView android:layout_width="match_parent" android:layout_height="wrap_content" android:scrollbars="none" android:paddingHorizontal="12dp" android:paddingBottom="10dp">
                      <com.google.android.material.chip.ChipGroup android:layout_width="wrap_content" android:layout_height="wrap_content" app:singleSelection="true" app:selectionRequired="true">
                          <com.google.android.material.chip.Chip android:id="@+id/chipAll" android:layout_width="wrap_content" android:layout_height="36dp" android:text="All" style="@style/FilterChip"/>
                          <com.google.android.material.chip.Chip android:id="@+id/chipText" android:layout_width="wrap_content" android:layout_height="36dp" android:text="Text" style="@style/FilterChip"/>
                          <com.google.android.material.chip.Chip android:id="@+id/chipUrl" android:layout_width="wrap_content" android:layout_height="36dp" android:text="Links" style="@style/FilterChip"/>
                          <com.google.android.material.chip.Chip android:id="@+id/chipNumber" android:layout_width="wrap_content" android:layout_height="36dp" android:text="Numbers" style="@style/FilterChip"/>
                          <com.google.android.material.chip.Chip android:id="@+id/chipImage" android:layout_width="wrap_content" android:layout_height="36dp" android:text="Images" style="@style/FilterChip"/>
                          <com.google.android.material.chip.Chip android:id="@+id/chipScreenshot" android:layout_width="wrap_content" android:layout_height="36dp" android:text="Screenshots" style="@style/FilterChip"/>
                      </com.google.android.material.chip.ChipGroup>
                  </HorizontalScrollView>
              </com.google.android.material.appbar.AppBarLayout>
              <androidx.recyclerview.widget.RecyclerView android:id="@+id/recyclerView" android:layout_width="match_parent" android:layout_height="match_parent" android:clipToPadding="false" android:paddingTop="8dp" android:paddingBottom="80dp" android:paddingHorizontal="12dp" app:layout_behavior="@string/appbar_scrolling_view_behavior"/>
              <LinearLayout android:id="@+id/emptyState" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="center" android:padding="40dp" android:visibility="gone" app:layout_behavior="@string/appbar_scrolling_view_behavior">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Nothing copied yet" android:textColor="@color/text_primary" android:textSize="20sp" android:textStyle="bold" android:layout_marginBottom="8dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Copy any text — ClipVault saves it automatically" android:textColor="@color/text_muted" android:textSize="14sp" android:gravity="center"/>
              </LinearLayout>
              <com.google.android.material.floatingactionbutton.ExtendedFloatingActionButton android:id="@+id/fabService" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="bottom|end" android:layout_margin="20dp" android:text="Show Bubble" app:icon="@android:drawable/ic_menu_share" app:backgroundTint="@color/accent" android:textColor="#000000"/>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF

          cat > app/src/main/res/layout/floating_bubble.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="56dp" android:layout_height="56dp">
              <LinearLayout android:layout_width="52dp" android:layout_height="52dp" android:layout_gravity="center" android:gravity="center" android:background="@drawable/bubble_bg" android:elevation="8dp">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="C" android:textColor="#000000" android:textSize="22sp"         
      - name: Regenerate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.6/bin/gradle wrapper --gradle-version=8.6 --distribution-type=bin
          chmod +x gradlew
          echo "Gradle wrapper ready"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        run: ls -lh app/build/outputs/apk/debug/    
 
