name: Build ClipVault APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Recreate settings.gradle
        run: |
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ClipVault"
          include ':app'
          SETTINGS
          echo "=== settings.gradle ==="
          cat settings.gradle

      - name: Recreate root build.gradle
        run: |
          cat > build.gradle << 'BUILDGRADLE'
          plugins {
              id 'com.android.application' version '8.3.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.23' apply false
          }
          BUILDGRADLE
          echo "=== build.gradle ==="
          cat build.gradle

      - name: Recreate app build.gradle
        run: |
          cat > app/build.gradle << 'APPGRADLE'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.clipvault.app'
              compileSdk 35
              defaultConfig {
                  applicationId "com.clipvault.app"
                  minSdk 26
                  targetSdk 35
                  versionCode 2
                  versionName "2.0"
                  vectorDrawables.useSupportLibrary = true
              }
              buildTypes {
                  debug { debuggable true }
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.debug
                  }
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
              packaging {
                  resources { excludes += '/META-INF/{AL2.0,LGPL2.1}' }
              }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.13.1'
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'com.google.code.gson:gson:2.11.0'
              implementation 'androidx.lifecycle:lifecycle-service:2.8.7'
          }
          APPGRADLE
          echo "=== app/build.gradle ==="
          cat app/build.gradle

      - name: Regenerate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.6/bin/gradle wrapper --gradle-version=8.6 --distribution-type=bin
          chmod +x gradlew
          echo "=== gradlew ready ==="

      - name: Show project structure
        run: |
          echo "=== Kotlin files found ==="
          find . -name "*.kt" | sort
          echo "=== Layouts found ==="
          find . -name "*.xml" | grep -v build | sort

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Confirm build
        run: ls -lh app/build/outputs/apk/debug/
        
