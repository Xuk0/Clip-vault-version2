              <string name="app_name">ClipVault</string>
          </resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ClipVault" parent="Theme.Material3.Dark">
                  <item name="colorPrimary">@color/accent</item>
                  <item name="colorOnPrimary">#000000</item>
                  <item name="colorSurface">@color/bg_surface</item>
                  <item name="colorOnSurface">@color/text_primary</item>
                  <item name="android:colorBackground">@color/bg_primary</item>
                  <item name="colorError">@color/error</item>
                  <item name="android:statusBarColor">@color/bg_surface</item>
                  <item name="android:navigationBarColor">@color/bg_primary</item>
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
              <style name="FilterChip" parent="Widget.Material3.Chip.Filter">
                  <item name="android:textColor">@color/text_muted</item>
                  <item name="chipBackgroundColor">@color/bg_surface</item>
                  <item name="chipStrokeColor">@color/border</item>
                  <item name="chipStrokeWidth">1dp</item>
                  <item name="checkedIconVisible">false</item>
              </style>
              <style name="SearchViewStyle" parent="Widget.AppCompat.SearchView">
                  <item name="queryBackground">@null</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/menu/main_menu.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto">
              <item android:id="@+id/action_toggle_service" android:title="Floating Bubble" app:showAsAction="never"/>
              <item android:id="@+id/action_clear" android:title="Clear All History" app:showAsAction="never"/>
          </menu>
          EOF

