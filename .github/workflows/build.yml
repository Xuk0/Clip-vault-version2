name: Build ClipVault APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 36
        run: |
          sdkmanager "platforms;android-36" "build-tools;34.0.0"

      - name: Regenerate Gradle wrapper (fixes corrupted gradlew)
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.6/bin/gradle wrapper --gradle-version=8.6 --distribution-type=bin
          chmod +x gradlew
          echo "=== gradlew regenerated ==="
          head -5 gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Confirm build
        run: ls -lh app/build/outputs/apk/debug/
        
